<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box</title>
    <style>
        div.container{
            background-color: orange;
            display: flex;
            flex-flow: row wrap;
        }
        div.child{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            flex: auto;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="child">EXEMPLO A</div>
        <div class="child">EXEMPLO B</div>
        <div class="child">EXEMPLO C</div>
        <div class="child">EXEMPLO D</div>
        <div class="child">EXEMPLO E</div>
        <div class="child">EXEMPLO F</div>
        <div class="child">EXEMPLO G</div>
        
    </div>
</body>
</html>
