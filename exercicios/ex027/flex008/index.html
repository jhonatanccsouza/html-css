<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box</title>
    <style>
        div.container{
            background-color: rgb(235, 235, 152);
            display: flex;
            flex-flow: row nowrap;
        }
        div.child{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            flex-basis: 80px;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="child">A</div>
        <div class="child">conteudo</div>
        <div class="child">C</div>
        <div class="child">conteudo grande</div>
        <div class="child">E</div>
        <div class="child">conteudo gigante, jdhifsahdfiuhubgakjon</div>
        <div class="child">G</div>
        
    </div>
</body>
</html>
