<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box</title>
    <style>
        div.container{
            background-color: rgb(253, 253, 155);
            display: flex;
            flex-flow: row wrap;
            align-content: space-around;
            height: 500px;
        }
        div.child{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 40px;
            
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="child">A</div>
        <div class="child">B</div>
        <div class="child">C</div>
        <div class="child">D</div>
        <div class="child">E</div>
        <div class="child">F</div>
        <div class="child">G</div>
        <div class="child">H</div>
        <div class="child">I</div>
        <div class="child">J</div>
        <div class="child">K</div>
        <div class="child">L</div>
        <div class="child">M</div>
        <div class="child">N</div>
        <div class="child">O</div>
        
    </div>
</body>
</html>
