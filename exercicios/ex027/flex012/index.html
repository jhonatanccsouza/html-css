<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box</title>
    <style>
        div.container{
            background-color: rgb(255, 255, 168);
            display: flex;
            flex-flow: row nowrap;
        }
        div.child{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;           
            
            
        }
        #c1{
            /* flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 300px; */
/* ShortHand = flex: flex-grow, flex-shrink, flex-basis; */

            flex: 1 1 300px;
        }
        #c2{
            /* flex-shrink: 0;
            flex-grow: 2;
            flex-basis: 300px; */

            flex: 2 0 300px;
        }
        #c3{
            /* flex-shrink: 2;
            flex-grow: 3;
            flex-basis: 300px; */

            flex: 3 2 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="child" id="c1">A</div>
        <div class= "child" id="c2">B</div>
        <div class="child" id="c3">C</div>
        
        
    </div>
</body>
</html>
