<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box</title>
    <style>
        div.container{
            background-color: beige;
            display: flex;
            flex-flow: row wrap;
        }
        div.child{
            background-color: lightblue;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            
            
        }

        div#c1{
            order: -1;
        }
        div#c2{
            order: 8;
        }
        div#c3{
            order: 10;
        }
        div#c4{
            order: 5;
        }
        div#c5{
            order: -3;
        }
        div#c6{
            order: 4;
        }
        div#c7{
            order: 2;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="child" id="c1">A</div>
        <div class="child" id="c2">B</div>
        <div class="child" id="c3">C</div>
        <div class="child" id="c4">D</div>
        <div class="child" id="c5">E</div>
        <div class="child" id="c6">F</div>
        <div class="child" id="c7">G</div>
        
    </div>
</body>
</html>
